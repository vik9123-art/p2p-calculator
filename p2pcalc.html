<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2P Calculator PRO</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  font-family: Arial;
  background: #0e0e0e;
  color: white;
  padding: 20px;
}
h2 { margin-bottom: 10px; }

.card {
  background: #1c1c1c;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 15px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
  font-size: 15px;
}

input {
  background: #2a2a2a;
  color: white;
}

button {
  background: #00c853;
  color: white;
  font-weight: bold;
}

.pro {
  background: #ff9800;
}

.result {
  font-size: 18px;
}
</style>
</head>

<body>

<h2>🚀 P2P Calculator PRO</h2>

<div class="card">
<input id="buy" type="number" placeholder="Цена покупки">
<input id="sell" type="number" placeholder="Цена продажи">
<input id="amount" type="number" placeholder="Количество">
<input id="fee_buy" type="number" placeholder="Комиссия покупки (%)">
<input id="fee_sell" type="number" placeholder="Комиссия продажи (%)">

<button onclick="calculate()">Рассчитать</button>
</div>

<div class="card result" id="result">
Результат
</div>

<div class="card">
<button class="pro" onclick="saveTrade()">💾 Сохранить сделку (PRO)</button>
<button onclick="loadTrades()">📊 История</button>
</div>

<script>
let isPro = false; // позже заменим на оплату

function calculate() {
  let buy = +document.getElementById("buy").value || 0;
  let sell = +document.getElementById("sell").value || 0;
  let amount = +document.getElementById("amount").value || 0;
  let feeBuy = (+document.getElementById("fee_buy").value || 0)/100;
  let feeSell = (+document.getElementById("fee_sell").value || 0)/100;

  let cost = buy * amount * (1 + feeBuy);
  let revenue = sell * amount * (1 - feeSell);
  let profit = revenue - cost;
  let roi = (profit / cost) * 100;

  document.getElementById("result").innerHTML =
    `💰 Прибыль: ${profit.toFixed(2)} <br>
     📊 ROI: ${roi.toFixed(2)}%`;
}

function saveTrade() {
  if (!isPro) {
    alert("⚠️ Доступно только в PRO");
    return;
  }

  let trade = {
    buy: buy.value,
    sell: sell.value,
    amount: amount.value
  };

  let trades = JSON.parse(localStorage.getItem("trades") || "[]");
  trades.push(trade);
  localStorage.setItem("trades", JSON.stringify(trades));

  alert("Сделка сохранена");
}

function loadTrades() {
  let trades = JSON.parse(localStorage.getItem("trades") || "[]");
  alert("Сделок: " + trades.length);
}

Telegram.WebApp.ready();
</script>

</body>
</html>
