<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>P2P Calculator PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
margin:0;
font-family: Arial;
background:#0f0f0f;
color:#fff;
}
.container {
padding:20px;
}
h1 {
text-align:center;
}
input {
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:none;
background:#1f1f1f;
color:#fff;
}
button {
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#00c853;
color:#fff;
font-size:16px;
}
.result {
margin-top:20px;
padding:15px;
border-radius:12px;
background:#1a1a1a;
}
.good { color:#00e676; }
.bad { color:#ff5252; }
</style>
</head>

<body>
<div class="container">
<h1>💸 P2P Calculator PRO</h1>

<input id="amount" placeholder="Сумма ($)">
<input id="buy" placeholder="Курс покупки">
<input id="sell" placeholder="Курс продажи">
<input id="fee" placeholder="Комиссия (%)">

<button onclick="calc()">Рассчитать</button>

<button onclick="saveTrade()">💾 Сохранить сделку (PRO)</button>

<button onclick="openDeals()">🔥 Готовые связки</button>
<div class="result" id="result"></div>
</div>

<script>
function calc(){
let amount = parseFloat(document.getElementById('amount').value);
let buy = parseFloat(document.getElementById('buy').value);
let sell = parseFloat(document.getElementById('sell').value);
let fee = parseFloat(document.getElementById('fee').value) / 100;

if(!amount || !buy || !sell){
alert("Заполни все поля");
return;
}

let crypto = amount / buy;
let afterSell = crypto * sell;
let final = afterSell - (afterSell * fee);

let profit = final - amount;
let percent = (profit / amount) * 100;

let status = profit > 0
? "<span class='good'>✅ ВЫГОДНО</span>"
: "<span class='bad'>❌ УБЫТОК</span>";

document.getElementById('result').innerHTML = `
💰 Прибыль: ${profit.toFixed(2)} $<br>
📊 ROI: ${percent.toFixed(2)} %<br><br>
${status}
`;
}
</script>

</body>
</html>
